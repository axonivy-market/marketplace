name: hoang-marketplace

services:
  mongodb:
    container_name: hoang-mongodb
    build:
      dockerfile: Dockerfile
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_INITDB_ROOT_USERNAME}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodata:/data/db
      - ./mongod.conf:/etc/mongod.conf
    networks:
      -  hoang-marketplace-network

volumes:
  mongodata:

networks:
  hoang-marketplace-network:
    external: true