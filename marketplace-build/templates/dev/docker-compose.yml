# Used for the local environment
name: marketplace

services:
  nginx:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ${NGINX_CONFIG_PATH}:/etc/nginx/nginx.conf
      - ${NGINX_CACHE_PATH}:/usr/share/nginx/html/cache
      - ${NGINX_LOG_PATH}:/var/log/nginx
      - marketcache:/usr/share/nginx/html/market-cache
      - marketbrowser:/usr/share/nginx/html/browser
    ports:
      - "4500:80"
    depends_on:
      - ui
      - app
    networks:
      - marketplace-network

  ui:
    env_file:
      - ../.env
    build:
      context: ../../../marketplace-ui
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=${BUILD_ENV}
    volumes:
      - marketbrowser:/browser_share
    restart: always
    command: sh -c "cp -r /app/dist/browser/* /browser_share && node dist/server/server.mjs"
    expose:
      - 4000
    networks:
      - marketplace-network

  app:
    restart: always
    volumes:
      - ${MARKET_INSTALLATIONS_PATH}:/app/data/market-installation.json
      - marketcache:/app/data/market-cache
      - ${APP_LOG_PATH}:/app/logs
    env_file:
      - ../.env
    build:
      context: ../../../marketplace-service
      dockerfile: app/Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION}
    expose:
      - 8080
    networks:
      - marketplace-network

  stable:
    restart: always
    volumes:
      - ${STABLE_LOG_PATH}:/app/logs
    env_file:
      - ../.env
    build:
      context: ../../../marketplace-service
      dockerfile: stable/Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION}
    ports:
      - "8085:8085"
    expose:
      - 8085
    networks:
      - marketplace-network

networks:
  marketplace-network:
    external: true

volumes:
  marketcache:
  marketbrowser:
