@if (adminInfo()) {
  <!-- <img
    id="user-avatar"
    [src]="adminInfo()!.avatarUrl"
    alt="GitHub avatar"
    class="github-avatar" /> -->

  <div class="col">
    <div ngbDropdown class="d-inline-block">
        <img
          type="button"
          class="btn btn-outline-primary"
          id="dropdownBasic1"
          ngbDropdownToggle
          id="user-avatar"
          [src]="adminInfo()!.avatarUrl"
          alt="GitHub avatar"
          class="github-avatar" />
      <!-- </button> -->
      <div ngbDropdownMenu aria-labelledby="dropdownBasic1" class="user-info-dropdown">
        <button ngbDropdownItem>Action - 1</button>
        <button ngbDropdownItem>Another Action</button>
        <button ngbDropdownItem>Something else is here</button>
      </div>
    </div>
  </div>
}
