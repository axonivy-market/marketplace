<div
  class="navbar-nav navbar-nav--right mr-auto flex-lg-row flex-column-reverse align-items-lg-center align-items-sm-stretch header__action">
  <div
    class="google-search-container text-primary google-search-svg-primary"
    [ngStyle]="{ display: isGoogleSearchBarDisplayed() ? 'block' : 'none' }">
    <div class="gcse-search"></div>
  </div>
  @if (isGoogleSearchBarDisplayed() == false) {
    <!-- Language Selection -->
    <ul
      class="d-flex flex-row-reverse flex-lg-row border-top-md-gray header__button justify-content-center align-items-center">
      <li class="header__button--right">
        <app-language-selection></app-language-selection>
      </li>

      <!-- Theme Mode -->
      <li class="header__button--right">
        <app-theme-selection></app-theme-selection>
      </li>

      <!-- Collapse Search -->
      <li class="d-none d-lg-flex header__button--right">
        @if (isGoogleSearchBarDisplayed()) {
          <div
            class="google-search-container text-primary google-search-svg-primary">
            <div class="gcse-search"></div>
          </div>
        } @else {
          <li class="d-flex search-icon">
            <i
              class="bi bi-search header__search-button"
              (click)="onClickSearchIcon()"></i>
          </li>
        }
      </li>
      <li>
        <app-github-user-badge></app-github-user-badge>
      </li>
      <li>
        <p>
          <button
            type="button"
            class="btn btn-outline-primary"
            (click)="collapse.toggle()"
            [attr.aria-expanded]="!isCollapsed"
            aria-controls="collapseExample">
            Toggle with Function
          </button>
          <button
            type="button"
            class="btn btn-outline-primary ms-2"
            (click)="isCollapsed = !isCollapsed"
            [attr.aria-expanded]="!isCollapsed"
            aria-controls="collapseExample">
            Toggle with Two Way Binding
          </button>
        </p>
        <div #collapse="ngbCollapse" [(ngbCollapse)]="isCollapsed">
          <div class="card">
            <div class="card-body">
              You can collapse this card by clicking one Toggle button
            </div>
          </div>
        </div>
      </li>
    </ul>
  }
</div>
