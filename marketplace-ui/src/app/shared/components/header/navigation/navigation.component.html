<!-- <div class="header__navigation h-100"> -->
  <!-- Mobile Search Input -->
  <div
    class="google-search-container text-primary google-search-svg-primary"
    [ngStyle]="{ display: isMobileMode() ? 'block' : 'none' }">
    <div class="gcse-search"></div>
  </div>

  <!-- Navigation -->
  <ul class="p-0 d-flex flex-column flex-xl-row m-0">
    @for (item of this.items; track item.label) {
      <li
        class="px-0 px-xl-2 d-xl-flex justify-content-xl-center align-items-xl-center">
        @let isHomePage = item.link === '/';
        @let isSyncPage = item.link === '/internal-dashboard';
        @let isInternal = item.link.startsWith('/');
        @if (isInternal) {
          <!-- <span #routerActive="routerLinkActive" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: isHomePage || isSyncPage }">
            <a 
            [lang]="languageService.selectedLanguage()" class="nav-link py-0" 
            [ngClass]="{
                'text-primary': isMobileMode() || routerActive.isActive,
                'text-secondary': !isMobileMode() && !routerActive.isActive,
                active: routerActive.isActive }"
            aria-current="page"
            [routerLink]="item.link" >
              {{ item.label | translate }}
            </a> -->
          <!-- <div class="active-line d-none" [ngClass]="{ 'd-lg-block': routerActive.isActive }"></div> -->
          <!-- </span> -->
          <!-- <span
            #routerActive="routerLinkActive"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: isHomePage || isSyncPage }"> -->
          <a
            #routerActive="routerLinkActive"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: isHomePage || isSyncPage }"
            [lang]="languageService.selectedLanguage()"
            class="nav-link h-100 px-0 py-0 d-xl-flex justify-content-xl-center align-items-xl-center"
            [ngClass]="{
              'text-primary': isMobileMode() || routerActive.isActive,
              'text-secondary': !isMobileMode() && !routerActive.isActive,
              active: routerActive.isActive
            }"
            aria-current="page"
            [routerLink]="item.link">
            {{ item.label | translate }}
          </a>
          <!-- <div class="active-line d-none" [ngClass]="{ 'd-lg-block': routerActive.isActive }"></div> -->
          <!-- </span> -->
        } @else {
          <a
            [lang]="languageService.selectedLanguage()"
            class="nav-link h-100 px-0 py-0 d-xl-flex justify-content-xl-center align-items-xl-center"
            [ngClass]="isMobileMode() ? 'text-primary' : 'text-secondary'"
            aria-current="page"
            [href]="item.link">
            {{ item.label | translate }}
          </a>
          <!-- External links are never router-active -->
          <div class="active-line d-none"></div>
        }
      </li>
    }
  </ul>
<!-- </div> -->
