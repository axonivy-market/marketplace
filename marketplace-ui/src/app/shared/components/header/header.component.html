<div class="header-container container">
  <div class="container-fluid px-0 h-100 d-flex justify-content-between align-items-center">
    <a routerLink="/" class="logo">
      <img
        class="logo__image"
        [src]="
          themeService.isDarkMode()
            ? '/assets/images/misc/axonivy-logo.svg'
            : '/assets/images/misc/axonivy-logo-black.svg'
        "
        alt="Axon Ivy" />
    </a>
    <app-navigation
      [isAdminPage]="isAdminRoute"
      class="d-none d-lg-flex justify-content-center align-items-center h-100" />
    <div class="d-none d-lg-flex justify-content-center align-items-center">
      <app-header-toolbar [ngClass]="userInfo() && 'me-4'"></app-header-toolbar>
      @if (userInfo()) {
        <app-github-user-badge />
      }
    </div>
    <div class="d-flex d-lg-none justify-content-end">
      <button
        class="btn border-0 rounded-3 p-0"
        [ngClass]="userInfo() && 'me-4'"
        (click)="toggleHeaderOffcanvas(content)">
        <i class="header__menu-button" [ngClass]="isHeaderOffcanvasOpen() ? 'ti ti-x' : 'ti ti-list'"></i>
      </button>
      @if (userInfo()) {
        <app-github-user-badge />
      }
    </div>
  </div>
</div>

<ng-template #content let-offcanvas id="header-offcanvas">
  <div class="offcanvas-body px-md-0 container d-flex flex-column justify-content-start mt-4">
    <div class="google-search-container text-primary google-search-svg-primary">
      <div id="offcanvas-google-search" class="gcse-search"></div>
    </div>
    <app-navigation [isAdminPage]="isAdminRoute" class="mt-4" />
    <app-header-toolbar class="mt-auto" [isInHeaderOffCanvas]="true"></app-header-toolbar>
  </div>
</ng-template>
