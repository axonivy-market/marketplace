<div class="token-container">
  <div class="header">
    <h2 class="text-primary text-center">
      {{ 'common.admin.pageTitle' | translate }}
    </h2>
    <h3 class="text-primary text-center">
      {{ 'common.admin.description' | translate }}
    </h3>
  </div>
  <div class="token-input-container">
    <h3 class="text-primary">
      {{ 'common.admin.enterToken' | translate }}
    </h3>
    <form (ngSubmit)="onSubmit()">
      <input
        id="token-input"
        type="password"
        [formControl]="tokenControl"
        [attr.placeholder]="'common.admin.enterTokenPlaceholder' | translate"
        autocomplete="current-password"
        required />

      <button
        type="submit"
        class="btn-primary"
        [ngClass]="themeService.isDarkMode() ? 'text-dark' : 'text-light'"
        [disabled]="isButtonDisabled"
        [style.pointer-events]="isProcessing ? 'none' : ''">
        @if (isProcessing) {
          <i class="fa fa-spinner fa-spin me-2"></i>
          {{ 'common.admin.proceedingBtnLabel' | translate }}
        } @else {
          {{ 'common.admin.proceedBtnLabel' | translate }}
        }
      </button>
      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }
    </form>
  </div>
</div>
