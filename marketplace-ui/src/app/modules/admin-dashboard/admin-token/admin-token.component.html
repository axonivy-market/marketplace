<div class="token-container">
  <div class="header">
    <h2 class="text-primary text-center">
      {{ 'common.admin.pageTitle' | translate }}
    </h2>
    <h3 class="text-primary text-center">
      {{ 'common.admin.description' | translate }}
    </h3>
  </div>
  <div class="token-input-container d-flex flex-column align-items-center">
    <form (ngSubmit)="onSubmit()" class="d-flex flex-column align-items-center justify-content-start">
      <h3 class="text-primary">
        Sign in with GitHub to continue
      </h3>
      <button
        type="submit"
        class="btn-primary mt-3"
        [ngClass]="themeService.isDarkMode() ? 'text-dark' : 'text-light'"
        [style.pointer-events]="isProcessing ? 'none' : ''">
        @if (isProcessing) {
          <i class="ti ti-rotate-clockwise-2 icon-spin me-2"></i>
          {{ 'common.admin.proceedingBtnLabel' | translate }}
        } @else {
          <i class="ti ti-arrow-right-to-arc"></i>
          {{ 'common.admin.proceedBtnLabel' | translate }}
        }
      </button>
    </form>
  </div>
</div>
