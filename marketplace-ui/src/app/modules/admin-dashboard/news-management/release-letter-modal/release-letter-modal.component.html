<div class="modal-body-wrapper changelog-container">
  <div class="modal-header">
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="activeModal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body">
    <h1>{{ item.sprint }}</h1>
    <div
      ngbAccordionBody
      class="p-0 changelog-content"
      [innerHtml]="renderReleaseLetterContent()"></div>
  </div>
</div>
