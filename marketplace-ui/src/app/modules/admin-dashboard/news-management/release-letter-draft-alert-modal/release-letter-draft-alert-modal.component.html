<div>
  <div class="modal-header">
    <h3>{{ 'common.admin.newsManagement.warning' | translate }}</h3>
  </div>
  <div class="modal-body">
    <div class="p-0 release-letter-content">
        You have unfinished draft for this release letter. Do you want to continue editing it?
    </div>
    <div class="modal-footer">
      <button
        (click)="onConfirm()"
        type="button"
        [lang]="languageService.selectedLanguage()"
        class="btn border-0 mb-0 me-2"
        [ngClass]="themeService.isDarkMode() ? 'btn-light text-dark' : 'btn-primary text-light'">
        Yes
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Close</button>
    </div>
  </div>
</div>
