<div class="row col-md-12">
  <h1
    class="text-primary admin-title"
    [lang]="languageService.selectedLanguage()">
    {{ translateService.get('common.admin.newsManagement.title') | async }}
  </h1>
  <div class="introduction-container">
    <div class="d-sm-block admin-about">
      <h3 class="text-secondary">
        {{
          translateService.get('common.admin.newsManagement.description')
            | async
        }}
      </h3>
    </div>
    <div
      class="d-sm-block align-items-center admin-help-text-container flex-fill">
      <h4
        [lang]="languageService.selectedLanguage()"
        class="text-secondary help-text"
        [innerHTML]="
          translateService.get('common.admin.newsManagement.helpText') | async
        "></h4>
    </div>
  </div>
</div>
<div>
  <input
    id="release-version"
    autocomplete="on"
    type="text"
    [lang]="languageService.selectedLanguage()"
    class="form-control input__search bg-secondary border-0 search-input mb-4"
    [placeholder]="translateService.get('common.admin.newsManagement.releaseVersionPlaceholder') | async"
    [ariaLabel]="translateService.get('common.admin.newsManagement.releaseVersionPlaceholder') | async"
    aria-describedby="search" />
</div>
<div>
  <app-markdown-editor
    [(contentValue)]="releaseLetterValue"
    [autosaveId]="'release-letter-content'"></app-markdown-editor>

  <button
    type="button"
    [lang]="languageService.selectedLanguage()"
    class="mt-4 btn border-0 submit-button text-center"
    (click)="onSubmit()"
    [ngClass]="themeService.isDarkMode() ? 'btn-light' : 'btn-primary'">
    Submit
  </button>
</div>
