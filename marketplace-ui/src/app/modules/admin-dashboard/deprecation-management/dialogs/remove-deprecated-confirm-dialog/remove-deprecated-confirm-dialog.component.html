@if (visible) {
  <div class="custom-modal-wrapper" [class.modal-closing]="isClosing">
    <div class="modal-content custom-modal confirm-modal" [class.modal-closing]="isClosing">
      <div class="modal-header">
        <h5 class="modal-title">
          {{ 'common.admin.deprecation.confirmRemoveDeprecatedTitle' | translate }}
        </h5>
        <button
          type="button"
          class="btn-close"
          [disabled]="isRemoving"
          (click)="closeDialog.emit()"></button>
      </div>

      <div class="modal-body">
        <p class="confirm-message">
          {{ 'common.admin.deprecation.confirmRemoveDeprecatedContent' | translate }}
        </p>
        <p class="text-muted">
          <strong>{{ 'common.admin.deprecation.extensionId' | translate }}</strong>
          {{ removedProductId }}
        </p>
      </div>

      <div class="modal-footer">
        <button
          class="btn btn-cancel btn-secondary me-2"
          [disabled]="isRemoving"
          (click)="closeDialog.emit()">
          {{ 'common.admin.sync.cancelLabel' | translate }}
        </button>
        <button
          class="btn btn-danger"
          [disabled]="isRemoving"
          (click)="confirm.emit()">
          @if (isRemoving) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          }
          {{ 'common.admin.deprecation.removeDeprecated' | translate }}
        </button>
      </div>
    </div>
  </div>

  <div
    class="custom-backdrop"
    [class.backdrop-closing]="isClosing"
    (click)="!isRemoving && closeDialog.emit()"></div>
}
