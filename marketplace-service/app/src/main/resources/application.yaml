server:
  port: '8080'
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: '${SESSION_TIMEOUT:2h}'
      cookie:
        name: '${SESSION_COOKIE_NAME:ADMIN_SESSION}'
        http-only: true
        secure: '${SESSION_COOKIE_SECURE:true}'
    context-path: /app
  tomcat:
    connection-timeout: 240000ms
    threads:
      max: '200'
    max-swallow-size: '-1'

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: '${POSTGRES_HOST_URL}'
    username: '${POSTGRES_USERNAME}'
    password: '${POSTGRES_PASSWORD}'
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    show-sql: '${SHOW_SQL}'
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mvc:
    async:
      request-timeout: '240000'
  servlet:
    multipart:
      enabled: 'true'
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    serialization:
      indent_output: 'true'

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
    version: OPENAPI_3_1

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator

logging:
  file:
    path: '${LOGGING_FILE_PATH}'
  level:
    org:
      springframework:
        web: warn
        security: debug
      hibernate:
        SQL: '${LOGGING_SQL_LEVEL:INFO}'
loggable:
  log-path: '${MARKET_LOG_PATH}'

jwt:
  secret: '${MARKET_JWT_SECRET_KEY}'
  expiration: '365'

market:
  environment: '${MARKET_ENVIRONMENT}'
  node-number: '${MARKET_NODE_NUMBER}'
  cors:
    allowed:
      origin:
        patterns: '${MARKET_CORS_ALLOWED_ORIGIN}'
        maxAge: '3600'
  github:
    oauth2:
      clientId: '${MARKET_GITHUB_OAUTH_APP_CLIENT_ID}'
      clientSecret: '${MARKET_GITHUB_OAUTH_APP_CLIENT_SECRET}'
    token: '${MARKET_GITHUB_TOKEN}'
    connect-timeout: '${MARKET_GITHUB_CONNECT_TIMEOUT:10000}'
    market:
      branch: '${MARKET_GITHUB_MARKET_BRANCH}'
  passkey:
    rp-id: '${MARKET_PASSKEY_RP_ID:}'
    rp-name: '${MARKET_PASSKEY_RP_NAME:Axon Ivy Marketplace Admin}'
    origins: '${MARKET_PASSKEY_ORIGINS:}'
    timeout-ms: '${MARKET_PASSKEY_TIMEOUT_MS:300000}'
  allowed:
    click-capacity: '${MARKET_CLICK_LIMIT}'
  encryption:
    key: '${MARKET_ENCRYPTION_SECRET_KEY}'
    salt: '${MARKET_ENCRYPTION_SALT}'
  info:
    title: "Marketplace app"
    description: "The restful api for marketplace website"
    version: '${BUILD_VERSION}'
