server:
  port: '8080'
  forward-headers-strategy: framework
  servlet:
    context-path: /app
    session:
      cookie:
        secure: '${SESSION_COOKIE_SECURE}'
  tomcat:
    connection-timeout: 240000ms
    threads:
      max: '200'
    max-swallow-size: '-1'

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: '${POSTGRES_HOST_URL}'
    username: '${POSTGRES_USERNAME}'
    password: '${POSTGRES_PASSWORD}'
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
  jpa:
    show-sql: '${SHOW_SQL}'
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mvc:
    async:
      request-timeout: '240000'
  servlet:
    multipart:
      enabled: 'true'
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    serialization:
      indent_output: 'true'

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
    version: OPENAPI_3_1

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator

logging:
  file:
    path: '${LOGGING_FILE_PATH}'
  level:
    org:
      springframework:
        web: warn
      hibernate:
        SQL: '${LOGGING_SQL_LEVEL:INFO}'
loggable:
  log-path: '${MARKET_LOG_PATH}'

jwt:
  secret: '${MARKET_JWT_SECRET_KEY}'
  expiration: '365'

market:
  environment: '${MARKET_ENVIRONMENT}'
  node-number: '${MARKET_NODE_NUMBER}'
  cors:
    allowed:
      origin:
        patterns: '${MARKET_CORS_ALLOWED_ORIGIN}'
        maxAge: '3600'
  encryption:
    key: '${MARKET_ENCRYPTION_SECRET_KEY}'
  info:
    title: "Marketplace app"
    description: "The restful api for marketplace website"
    version: '${BUILD_VERSION}'