server:
  port: '8085'
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: 'true'
  tomcat:
    connection-timeout: 240000ms
    threads:
      max: '200'
    max-swallow-size: '-1'

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: '${POSTGRES_HOST_URL}'
    username: '${POSTGRES_USERNAME}'
    password: '${POSTGRES_PASSWORD}'
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

market:
  info:
    title: "Marketplace stable"
    description: "The stable public api"
    version: '${BUILD_VERSION}'
  cors:
    allowed:
      origin:
        patterns: '${MARKET_CORS_ALLOWED_ORIGIN}'
        maxAge: '3600'
      mappings: '${MARKET_CORS_ALLOWED_MAPPINGS}'
      methods: '${MARKET_CORS_ALLOWED_METHODS}'
springdoc:
  api-docs:
    path: /api-docs
    version: OPENAPI_3_1

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
      base-path: /actuator
  server:
    base-path: /actuator    
