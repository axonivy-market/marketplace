name: ci-ui

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "marketplace-ui/**"
      - ".github/workflows/ci-ui.yml"
  push:
    branches:
      - master
    paths:
      - "marketplace-ui/**"
      - ".github/workflows/ci-ui.yml"

jobs:
  ui-build:
    name: Build UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marketplace-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: marketplace-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
