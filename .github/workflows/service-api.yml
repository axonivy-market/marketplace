name: Service Api testing
run-name: Postman testing workflow for e2e testing
on:
  push:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        
      - name: Run API tests
        id: run_tests
        run: |
          echo "Run defined api collection & gen test report"
          newman run "https://api.postman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?access_key=${{ secrets.POSTMAN_API_KEY }}" -r htmlextra --reporter-htmlextra-title "Api Testing Report - Axon Ivy Marketplace" --reporter-htmlextra-browserTitle "Axon Ivy Market Api Testing Report" --reporter-htmlextra-export "./test-report.html"
          ls -l

      - name: Export report
        run: |
          echo "Test report:"
          cat test-report.html

      - name: Upload report as artifact
        if: always()  # Ensures this step runs regardless of previous step outcome
        uses: actions/upload-artifact@v3
        with:
          name: postman-test-report
          path: test-report.html